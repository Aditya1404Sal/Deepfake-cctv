# Reference documentation of the 5 named CCTV degradation profiles.
# The pipeline imports profile builders from src/cctv_dfd/degradations.py;
# this file is for human readers and the report.

profiles:
  clean:
    description: Identity baseline.

  light_cctv:
    description: Mild surveillance degradation.
    ops:
      - ImageCompression(quality=55-75)
      - Downscale(scale=0.5-0.75, INTER_AREA)
      - GaussNoise(var=10-25)

  heavy_cctv:
    description: Aggressive surveillance degradation.
    ops:
      - ImageCompression(quality=30-50)
      - Downscale(scale=0.25-0.4, INTER_AREA)
      - MotionBlur(blur_limit=7)
      - GaussNoise(var=20-50)

  low_light_gray:
    description: Grayscale + night-time brightness drop.
    ops:
      - ToGray
      - RandomBrightnessContrast(brightness=-0.4..-0.2)
      - GaussNoise(var=15-30)

  ir_pseudo:
    description: Poor-man's infrared look-alike.
    ops:
      - ToGray
      - CLAHE(clip=4.0, tile=8x8)
      - GaussianBlur(3x3)
      - RandomBrightnessContrast(contrast=+0.2..+0.4)

sample_weights:
  # Train-time sampling distribution; eval applies each profile separately.
  clean: 0.4
  light_cctv: 0.2
  heavy_cctv: 0.2
  low_light_gray: 0.1
  ir_pseudo: 0.1
